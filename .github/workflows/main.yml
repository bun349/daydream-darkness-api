name: Bureau API Automation (CI/CS)

# Workflow akan berjalan otomatis saat ada Push atau PR ke branch main/develop
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 1. Job untuk Continuous Integration (Unit Testing)
  Unit-Testing-CI:
    name: Run Unit Tests (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Execute Unit Tests (Jest)
        run: npm test

  # 2. Job untuk Security Scan (CS)
  Security-Scan-CS:
    name: Vulnerability Scan (CS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Security Audit (npm audit)
        # Akan memindai package.json untuk mencari celah keamanan tinggi/kritis
        run: npm audit --audit-level=high

# 3. Job untuk Continuous Delivery (CD)
  Docker-Delivery-CD:
    name: Build & Push Docker Image (CD)
    runs-on: ubuntu-latest
    # CD hanya berjalan kalau CI dan CS sukses (lulus ujian)
    needs: [Unit-Testing-CI, Security-Scan-CS]
    # Memberi izin GitHub Actions untuk nulis ke GitHub Packages
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Menggunakan nama repo kamu sebagai nama image-nya
          tags: ghcr.io/${{ github.repository }}/bureau-api:latest